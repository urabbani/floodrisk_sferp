# Apache configuration for /leftbank survey progress page
# Add this to /etc/apache2/sites-available/floodrisk.conf or include separately

Alias /leftbank /var/www/leftbank

<Directory /var/www/leftbank>
    Options FollowSymLinks
    AllowOverride None
    Require all granted

    # Enable CORS for GeoJSON access
    Header set Access-Control-Allow-Origin "*"

    # Set proper content types
    <Files "data.geojson">
        ForceType application/geo+json
    </Files>
    <Files "meta.json">
        ForceType application/json
    </Files>
</Directory>

# Logging
ErrorLog ${APACHE_LOG_DIR}/leftbank_error.log
CustomLog ${APACHE_LOG_DIR}/leftbank_access.log combined
